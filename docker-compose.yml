# ============================================================
# DATALAKE OAR — Docker Compose
# Servicios: App (FastAPI) + MinIO (Object Storage)
# PostgreSQL corre en instancia externa — configurar DATABASE_URL en .env
# ============================================================

version: '3.9'

services:

  # ----------------------------------------------------------
  # App — FastAPI backend
  # ----------------------------------------------------------
  app:
    build: .
    container_name: oar_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-oar-datalake}
      - MINIO_SECURE=false
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - oar_net
    volumes:
      - ./app:/app  # hot reload en desarrollo

  # ----------------------------------------------------------
  # MinIO — Object Storage S3-compatible
  # API:     http://localhost:9000
  # Console: http://localhost:9001
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: oar_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oar_net

# ----------------------------------------------------------
# Volumes & Networks
# ----------------------------------------------------------
volumes:
  minio_data:
    name: oar_minio_data

networks:
  oar_net:
    name: oar_network
    driver: bridge
