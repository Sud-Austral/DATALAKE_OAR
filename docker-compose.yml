# ============================================================
# DATALAKE OAR — Docker Compose para desarrollo LOCAL
# Railway usa el Dockerfile directamente (ignora este archivo).
# MinIO y FastAPI en el mismo contenedor vía start.sh
# ============================================================

version: '3.9'

services:

  # App con MinIO embebido (replica el comportamiento de Railway)
  app:
    build: .
    container_name: oar_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - MINIO_ENDPOINT=localhost:9000
    volumes:
      - minio_data:/data      # Persistencia de MinIO (igual que Railway)
      - ./app:/app/app        # Hot reload solo del código app/

volumes:
  minio_data:
    name: oar_minio_data
